<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Food delivery Application - Delivering Delicious Meals to Your Doorstep</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./images/favicon.ico">
</head>

<body>
    <!-- Header Section -->
    <header class="headercnt">
        <div class="logocnt">
            <img src="./images/logo.png" alt="Food Delivery Logo" class="logo">
        </div>
        <div class="searchcnt">
            <input type="search" placeholder="Search for food, restaurants..." class="searchInput">
        </div>
        <ul class="linkcnt" type="none">
            <li class="navLink"><a href="#">Home</a></li>
            <li class="navLink"><a href="#">About Us</a></li>
            <li class="navLink"><a href="#">Login</a></li>
            <li class="navLink"><a href="#">Contact Us</a></li>
        </ul>
    </header>
    <!-- banner section -->
    <div class="bannercnt">
        <p class="bannertext">Delivering Delicious Meals to Your Doorstep</p>

        <p class="bannertext2">
            Order from your favorite restaurants and enjoy a hassle-free dining
            experience with fast delivery and fresh, delicious meals.
        </p>

        <div class="btnGroup">
            <button class="bannerbtn">Order Now</button>
            <button class="bannerbtn">View Menu</button>
        </div>
    </div>
</body>

</html>
